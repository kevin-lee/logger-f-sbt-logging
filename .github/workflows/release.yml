name: Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  GH_JAVA_DISTRIBUTION: "temurin"
  GH_SBT_OPTS: "-Xss64m -Xms1024m -XX:MaxMetaspaceSize=2G -Xmx8G -XX:MaxInlineLevel=18 -XX:+UnlockExperimentalVMOptions"
  SCALA_VERSION_2_12: "2.12.18"
  SCALA_VERSION_2_13: "2.13.18"
  SCALA_VERSION_3: "3.8.4"

jobs:


  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scala:
          - { name: "Scala 2", version: "2.12.18", binary-version: "2.12", java-version: "11", java-distribution: "temurin", report: "" }
          - { name: "Scala 2", version: "2.13.18", binary-version: "2.13", java-version: "11", java-distribution: "temurin", report: "" }
          - { name: "Scala 3", version: "3.8.4",   binary-version: "3",    java-version: "17", java-distribution: "temurin", report: "" }

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.scala.java-version }}
          distribution: ${{ matrix.scala.java-distribution }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - name: "[Push] Build All for ${{ matrix.scala.name }}: ${{ matrix.scala.version }} - ${{ github.run_number }}"
        env:
          CURRENT_BRANCH_NAME: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
        run: |
          echo "[BEFORE]CURRENT_BRANCH_NAME=${CURRENT_BRANCH_NAME}"
          export CURRENT_BRANCH_NAME="${CURRENT_BRANCH_NAME#refs/heads/}"
          echo " [AFTER]CURRENT_BRANCH_NAME=${CURRENT_BRANCH_NAME}"
          echo "RUN_ID=${RUN_ID}"
          echo "RUN_NUMBER=${RUN_NUMBER}"
          echo "Push #${PUSH_NUMBER}"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "SBT_OPTS=${SBT_OPTS}"
          java -version
          sbt \
            ++${{ matrix.scala.version }} \
            -v \
            clean \
            +test


  gh-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: ${{ env.GH_JAVA_DISTRIBUTION }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - name: sbt GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
        run: |
          echo "Run] sbt GitHub release"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo 'sbt devOopsGitHubRelease'
          sbt \
            -v \
            devOopsGitHubRelease
          
          sbt \
            -v \
            clean \
            "+Test/compile"

  publish:
    needs: gh-release

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: |
            11
            17
          distribution: ${{ env.GH_JAVA_DISTRIBUTION }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - uses: olafurpg/setup-gpg@v3

      - name: "sbt ci-release - ${{ github.run_number }}"
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
        run: |
          echo "Run] sbt ci-release"
          export SOURCE_DATE_EPOCH=$(date +%s)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "JAVA_HOME_11_X64=${JAVA_HOME_11_X64}"
          echo "JAVA_HOME_17_X64=${JAVA_HOME_17_X64}"

          echo '[Java 11] publishSigned for Scala 2.13 and 2.12'
          JAVA_HOME="$JAVA_HOME_11_X64" PATH="$JAVA_HOME_11_X64/bin:$PATH" \
          sbt \
            -v \
            clean \
            ++${SCALA_VERSION_2_13} sbtLogging/publishSigned \
            ++${SCALA_VERSION_2_12} sbtLogging/publishSigned

          echo '[Java 17] publishSigned for Scala 3.8.4'
          JAVA_HOME="$JAVA_HOME_17_X64" PATH="$JAVA_HOME_17_X64/bin:$PATH" \
          sbt \
            -v \
            ++${SCALA_VERSION_3} sbtLogging/publishSigned

          echo '[Release] sonatypeBundleRelease (single bundle)'
          sbt \
            -v \
            sonatypeBundleRelease


  publish-snapshot:
    if: startsWith(github.ref, 'refs/heads/')
    needs: build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: |
            11
            17
          distribution: ${{ env.GH_JAVA_DISTRIBUTION }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - uses: olafurpg/setup-gpg@v3

      - name: "sbt ci-release (no tag) - ${{ github.run_number }}"
        if: startsWith(github.ref, 'refs/heads/')
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
        run: |
          echo "Run] sbt ci-release"
          export SOURCE_DATE_EPOCH=$(date +%s)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "JAVA_HOME_11_X64=${JAVA_HOME_11_X64}"
          echo "JAVA_HOME_17_X64=${JAVA_HOME_17_X64}"

          echo '[Java 11] publishSigned for Scala 2.13 and 2.12'
          JAVA_HOME="$JAVA_HOME_11_X64" PATH="$JAVA_HOME_11_X64/bin:$PATH" \
          sbt \
            -v \
            clean \
            ++${SCALA_VERSION_2_13} sbtLogging/publishSigned \
            ++${SCALA_VERSION_2_12} sbtLogging/publishSigned

          echo '[Java 17] publishSigned for Scala 3.8.4'
          JAVA_HOME="$JAVA_HOME_17_X64" PATH="$JAVA_HOME_17_X64/bin:$PATH" \
          sbt \
            -v \
            ++${SCALA_VERSION_3} sbtLogging/publishSigned
