name: Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  GH_JAVA_DISTRIBUTION: "temurin"
  GH_SBT_OPTS: "-Xss64m -Xms1024m -XX:MaxMetaspaceSize=2G -Xmx8G -XX:MaxInlineLevel=18 -XX:+UnlockExperimentalVMOptions"

jobs:


  setup:
    runs-on: ubuntu-latest
    outputs:
      scala-matrix: ${{ steps.read.outputs.matrix }}
      java11-versions: ${{ steps.read.outputs.java11 }}
      java17-versions: ${{ steps.read.outputs.java17 }}
      java-versions: ${{ steps.read.outputs.javas }}
    steps:
      - uses: actions/checkout@v7
      - id: read
        run: |
          echo "matrix=$(jq -c . .github/scala-versions.json)" >> "$GITHUB_OUTPUT"
          echo "java11=$(jq -c '[.[] | select(."java-version" == "11") | .version]' .github/scala-versions.json)" >> "$GITHUB_OUTPUT"
          echo "java17=$(jq -c '[.[] | select(."java-version" == "17") | .version]' .github/scala-versions.json)" >> "$GITHUB_OUTPUT"
          {
            echo "javas<<__GHA_EOF__"
            jq -r '[.[]."java-version"] | unique | .[]' .github/scala-versions.json
            echo "__GHA_EOF__"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scala: ${{ fromJSON(needs.setup.outputs.scala-matrix) }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.scala.java-version }}
          distribution: ${{ matrix.scala.java-distribution }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - name: "[Push] Build All for ${{ matrix.scala.name }}: ${{ matrix.scala.version }} - ${{ github.run_number }}"
        env:
          CURRENT_BRANCH_NAME: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
        run: |
          echo "[BEFORE]CURRENT_BRANCH_NAME=${CURRENT_BRANCH_NAME}"
          export CURRENT_BRANCH_NAME="${CURRENT_BRANCH_NAME#refs/heads/}"
          echo " [AFTER]CURRENT_BRANCH_NAME=${CURRENT_BRANCH_NAME}"
          echo "RUN_ID=${RUN_ID}"
          echo "RUN_NUMBER=${RUN_NUMBER}"
          echo "Push #${PUSH_NUMBER}"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "SBT_OPTS=${SBT_OPTS}"
          java -version
          sbt \
            ++${{ matrix.scala.version }} \
            -v \
            clean \
            test


  gh-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: ${{ env.GH_JAVA_DISTRIBUTION }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - name: sbt GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
        run: |
          echo "Run] sbt GitHub release"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo 'sbt devOopsGitHubRelease'
          sbt \
            -v \
            devOopsGitHubRelease
          
          sbt \
            -v \
            clean \
            "+Test/compile"

  publish:
    needs: [setup, gh-release]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ needs.setup.outputs.java-versions }}
          distribution: ${{ env.GH_JAVA_DISTRIBUTION }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - uses: olafurpg/setup-gpg@v3

      - name: "sbt ci-release - ${{ github.run_number }}"
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
          JAVA11_VERSIONS_JSON: ${{ needs.setup.outputs.java11-versions }}
          JAVA17_VERSIONS_JSON: ${{ needs.setup.outputs.java17-versions }}
        shell: bash
        run: |
          echo "Run] sbt ci-release"
          export SOURCE_DATE_EPOCH=$(date +%s)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "JAVA_HOME_11_X64=${JAVA_HOME_11_X64}"
          echo "JAVA_HOME_17_X64=${JAVA_HOME_17_X64}"
          echo "JAVA11_VERSIONS_JSON=${JAVA11_VERSIONS_JSON}"
          echo "JAVA17_VERSIONS_JSON=${JAVA17_VERSIONS_JSON}"

          echo '[GPG] import secret key (same as sbt-ci-release setupGpg)'
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --import

          echo '[Java 11] publishSigned for Scala 2.x'
          export JAVA_HOME="$JAVA_HOME_11_X64"
          export PATH="$JAVA_HOME_11_X64/bin:$PATH"
          args=(clean)
          while IFS= read -r v; do
            args+=("++${v}; sbt-logging/publishSigned")
          done < <(jq -r '.[]' <<< "$JAVA11_VERSIONS_JSON")
          sbt -v "${args[@]}"

          echo '[Java 17] publishSigned for Scala 3'
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME_17_X64/bin:$PATH"
          args=()
          while IFS= read -r v; do
            args+=("++${v}; sbt-logging/publishSigned")
          done < <(jq -r '.[]' <<< "$JAVA17_VERSIONS_JSON")
          sbt -v "${args[@]}"

          echo '[Release] sonaRelease (single bundle)'
          sbt \
            -v \
            sonaRelease


  publish-snapshot:
    if: startsWith(github.ref, 'refs/heads/')
    needs: [setup, build]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ needs.setup.outputs.java-versions }}
          distribution: ${{ env.GH_JAVA_DISTRIBUTION }}
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - uses: olafurpg/setup-gpg@v3

      - name: "sbt ci-release (no tag) - ${{ github.run_number }}"
        if: startsWith(github.ref, 'refs/heads/')
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SBT_OPTS: ${{ env.GH_SBT_OPTS }}
          JAVA11_VERSIONS_JSON: ${{ needs.setup.outputs.java11-versions }}
          JAVA17_VERSIONS_JSON: ${{ needs.setup.outputs.java17-versions }}
        shell: bash
        run: |
          echo "Run] sbt ci-release"
          export SOURCE_DATE_EPOCH=$(date +%s)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          echo "SBT_OPTS=${SBT_OPTS}"
          echo "JAVA_HOME_11_X64=${JAVA_HOME_11_X64}"
          echo "JAVA_HOME_17_X64=${JAVA_HOME_17_X64}"
          echo "JAVA11_VERSIONS_JSON=${JAVA11_VERSIONS_JSON}"
          echo "JAVA17_VERSIONS_JSON=${JAVA17_VERSIONS_JSON}"

          echo '[GPG] import secret key (same as sbt-ci-release setupGpg)'
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --import

          echo '[Java 11] publishSigned for Scala 2.x'
          export JAVA_HOME="$JAVA_HOME_11_X64"
          export PATH="$JAVA_HOME_11_X64/bin:$PATH"
          args=(clean)
          while IFS= read -r v; do
            args+=("++${v}; sbt-logging/publishSigned")
          done < <(jq -r '.[]' <<< "$JAVA11_VERSIONS_JSON")
          sbt -v "${args[@]}"

          echo '[Java 17] publishSigned for Scala 3'
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME_17_X64/bin:$PATH"
          args=()
          while IFS= read -r v; do
            args+=("++${v}; sbt-logging/publishSigned")
          done < <(jq -r '.[]' <<< "$JAVA17_VERSIONS_JSON")
          sbt -v "${args[@]}"
